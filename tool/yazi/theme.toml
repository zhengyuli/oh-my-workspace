# -----------------------------------------------------------------------------
# Flavor
# -----------------------------------------------------------------------------

[flavor]
dark = "catppuccin-mocha"

# -----------------------------------------------------------------------------
# Manager
# -----------------------------------------------------------------------------

[mgr]
border_style = { fg = "#45475a" }

# -----------------------------------------------------------------------------
# Indicator
# -----------------------------------------------------------------------------

[indicator]
preview = { fg = "#89b4fa" }

# -----------------------------------------------------------------------------
# Status
# -----------------------------------------------------------------------------

[status]
perm_type = { fg = "#45475a" }
perm_read = { fg = "#45475a" }
perm_write = { fg = "#45475a" }
perm_exec = { fg = "#45475a" }
perm_sep = { fg = "#45475a" }
