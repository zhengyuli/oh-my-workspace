# -----------------------------------------------------------------------------
# Manager
# -----------------------------------------------------------------------------

[mgr]
# Natural sort: case-insensitive, e.g. 1.md < 2.md < 10.md
sort_by = "natural"

# -----------------------------------------------------------------------------
# Preview
# -----------------------------------------------------------------------------

[preview]
# Lanczos3 resampling for sharp image downscaling (highest quality)
image_filter = "lanczos3"

# -----------------------------------------------------------------------------
# Tasks
# -----------------------------------------------------------------------------

[tasks]
# No dimension cap for full-resolution image previews
image_bound = [0, 0]

# -----------------------------------------------------------------------------
# Plugin Fetchers
# -----------------------------------------------------------------------------

# --- Files ---
[[plugin.prepend_fetchers]]
id = "git"
url = "*"
run = "git"

# --- Directories ---
[[plugin.prepend_fetchers]]
id = "git"
url = "*/"
run = "git"
