# keymap.toml -*- mode: toml; -*-
# =============================================================================
# Yazi Keybindings - Vim-style navigation (no plugin dependencies)
#
# Location: ~/.config/yazi/keymap.toml
# References:
#   1. https://yazi-rs.github.io/docs/configuration/keymap/
# =============================================================================

# -----------------------------------------------------------------------------
# Manager - Navigation
#
# Use built-in commands only:
#   leave  - Go back to parent directory
#   enter  - Enter the hovered directory
#   open   - Open file(s) with default opener
# -----------------------------------------------------------------------------

[[manager.prepend_keymap]]
on  = [ "h" ]
run = "leave"
desc = "Go back to the parent directory"

[[manager.prepend_keymap]]
on  = [ "l" ]
run = "enter"
desc = "Enter the hovered directory"

[[manager.prepend_keymap]]
on  = [ "<Enter>" ]
run = "open"
desc = "Open file(s) with the default opener"

# -----------------------------------------------------------------------------
# Manager - Tab Management
# -----------------------------------------------------------------------------

[[manager.prepend_keymap]]
on  = [ "T" ]
run = "tab_create --current"
desc = "Create a new tab at the current path"

[[manager.prepend_keymap]]
on  = [ "t" ]
run = "tab_create"
desc = "Create a new tab"

[[manager.prepend_keymap]]
on  = [ "1" ]
run = "tab_switch 0"
desc = "Switch to tab 1"

[[manager.prepend_keymap]]
on  = [ "2" ]
run = "tab_switch 1"
desc = "Switch to tab 2"

[[manager.prepend_keymap]]
on  = [ "3" ]
run = "tab_switch 2"
desc = "Switch to tab 3"

[[manager.prepend_keymap]]
on  = [ "4" ]
run = "tab_switch 3"
desc = "Switch to tab 4"

[[manager.prepend_keymap]]
on  = [ "5" ]
run = "tab_switch 4"
desc = "Switch to tab 5"
