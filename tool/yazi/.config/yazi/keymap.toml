# -----------------------------------------------------------------------------
# Plugin Keybindings
# -----------------------------------------------------------------------------

# --- Smart Enter ---
# Vim-style: l, Enter, and o all enter directories or open files
[[mgr.prepend_keymap]]
on = "l"
run = "plugin smart-enter"
desc = "Enter directory or open file"

[[mgr.prepend_keymap]]
on = "<Enter>"
run = "plugin smart-enter"
desc = "Enter directory or open file"

[[mgr.prepend_keymap]]
on = "o"
run = "plugin smart-enter"
desc = "Enter directory or open file"

# --- Smart Filter ---
# Shift+F for filter mode (capital F avoids conflict with lowercase f)
[[mgr.prepend_keymap]]
on = "F"
run = "plugin smart-filter"
desc = "Smart filter"

# --- Toggle Pane ---
# Shift+T toggles preview maximize (T is adjacent to tab-related keys)
[[mgr.prepend_keymap]]
on = "T"
run = "plugin toggle-pane max-preview"
desc = "Maximize or restore preview pane"

# --- Zoom ---
# Plus/minus for intuitive zoom in/out of preview pane
[[mgr.prepend_keymap]]
on = "+"
run = "plugin zoom 1"
desc = "Zoom in preview"

[[mgr.prepend_keymap]]
on = "-"
run = "plugin zoom -1"
desc = "Zoom out preview"

# --- Help ---
[[mgr.prepend_keymap]]
on = "?"
run = "help"
desc = "Open help"
