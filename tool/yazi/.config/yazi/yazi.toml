# -----------------------------------------------------------------------------
# Manager
# -----------------------------------------------------------------------------

[mgr]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "none"
show_hidden = false
show_symlink = true
scrolloff = 5

# -----------------------------------------------------------------------------
# Preview
# -----------------------------------------------------------------------------

[preview]
wrap = "no"
tab_size = 2
max_width = 600
max_height = 900
image_filter = "lanczos3"
image_quality = 75

# -----------------------------------------------------------------------------
# Tasks
# -----------------------------------------------------------------------------

[tasks]
micro_workers = 10
macro_workers = 25
# 512 MiB limit — sufficient for high-res previews without runaway alloc
image_alloc = 536870912
# [0, 0] means no bound on image dimensions (width, height)
image_bound = [0, 0]
suppress_preload = false

# -----------------------------------------------------------------------------
# Plugins - Fetchers
# -----------------------------------------------------------------------------

# Git status fetcher for files
[[plugin.prepend_fetchers]]
id = "git"
url = "*"
run = "git"

# Git status fetcher for directories
[[plugin.prepend_fetchers]]
id = "git"
url = "*/"
run = "git"
