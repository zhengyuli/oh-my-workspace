# yazi.toml -*- mode: toml; -*-
# Time-stamp: <2026-03-24 17:00:00 Mon by zhengyu.li>
# =============================================================================
# Yazi - Blazing fast terminal file manager
#
# Location: ~/.config/yazi/yazi.toml
# XDG: Follows XDG_CONFIG_HOME, uses ~/.config/yazi/
# References:
#   1. https://yazi-rs.github.io/docs/configuration/yazi/
# =============================================================================

# -----------------------------------------------------------------------------
# Manager
# -----------------------------------------------------------------------------

[mgr]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = false
show_symlink = true
scrolloff = 5

# -----------------------------------------------------------------------------
# Preview
# -----------------------------------------------------------------------------

[preview]
wrap = "no"
tab_size = 2
max_width = 600
max_height = 900
image_delay = 50
image_filter = "lanczos3"
image_quality = 75

# -----------------------------------------------------------------------------
# Tasks
# -----------------------------------------------------------------------------

[tasks]
micro_workers = 10
macro_workers = 25
image_alloc = 536870912
image_bound = [0, 0]
suppress_preload = false
