# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------

# --- Smart Enter ---
# Enter directories or open files with l/Enter/o (vim-style navigation)
[[plugin.deps]]
use = "yazi-rs/plugins:smart-enter"
rev = "1962818"
hash = "187cc58ba7ac3befd49c342129e6f1b6"

# --- Smart Filter ---
# Fuzzy search to filter visible files (more flexible than glob patterns)
[[plugin.deps]]
use = "yazi-rs/plugins:smart-filter"
rev = "1962818"
hash = "c887903a63a2ff520081b6d90a4b3392"

# --- Full Border ---
# Draw borders around all panels for clearer visual separation
[[plugin.deps]]
use = "yazi-rs/plugins:full-border"
rev = "1962818"
hash = "6fa6a05a81c98dd000fbca3cca6e9682"

# --- Toggle Pane ---
# Maximize/restore the preview pane (useful for reading long files)
[[plugin.deps]]
use = "yazi-rs/plugins:toggle-pane"
rev = "1962818"
hash = "4c0260feb50ea2437380690ffc241da7"

# --- Zoom ---
# Zoom in/out of image and text previews with +/- keys
[[plugin.deps]]
use = "yazi-rs/plugins:zoom"
rev = "1962818"
hash = "fa268cb59989a87780605fdcfb8d99a9"

# --- Git ---
# Show git status icons and file modifications in the file list
[[plugin.deps]]
use = "yazi-rs/plugins:git"
rev = "1962818"
hash = "26db011a778f261d730d4f5f8bf24b3f"

# -----------------------------------------------------------------------------
