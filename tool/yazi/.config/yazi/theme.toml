# theme.toml -*- mode: toml; -*-
# =============================================================================
# Yazi Theme - Catppuccin Mocha Flavor
#
# Location: ~/.config/yazi/theme.toml
# Usage:    Uses catppuccin-mocha flavor (installed via ya pkg)
#
# Setup:
#   1. stow tool/yazi
#   2. ya pkg install  # Install flavor from package.toml
#
# References:
#   1. https://yazi-rs.github.io/docs/flavors/overview/
#   2. https://github.com/yazi-rs/flavors
# =============================================================================

[flavor]
dark = "catppuccin-mocha"
