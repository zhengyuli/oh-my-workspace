# theme.toml -*- mode: toml; -*-
# =============================================================================
# Yazi Theme Configuration - Doom One
#
# Location: ~/.config/yazi/theme.toml
# References:
#   1. https://yazi-rs.github.io/docs/configuration/theme/
#   2. https://github.com/doomemacs/themes (doom-one-theme.el)
#
# Color Palette:
#   bg          #282c34   background
#   bg-alt      #21242b   deeper background (panels, masks)
#   bg-hl       #353b45   highlighted background (hover rows)
#   fg          #bbc2cf   foreground / default text
#   fg-comment  #5B6268   comments / dimmed text
#   blue        #51afef   primary accent
#   dark-blue   #2257a0   borders / separators
#   cyan        #46d9ff   go, special highlights
#   teal        #4db5bd   markdown, docs
#   green       #98be65   success, shell, select mode
#   red         #ff6c6b   errors, archives, HTML
#   orange      #da8548   rust, swift, warnings
#   yellow      #ecbe7b   JS, config values, find highlight
#   magenta     #c678dd   CSS variants, kotlin, pick active
#   violet      #a9a1e1   config files, which desc
# =============================================================================

# -----------------------------------------------------------------------------
# Manager
# -----------------------------------------------------------------------------

[mgr]
# Current working directory displayed at the top
cwd = { fg = "#51afef", bold = true }

# Hovered item — inverted blue for strong contrast
hovered = { fg = "#282c34", bg = "#51afef" }
preview_hovered = { underline = true }

# Incremental search keyword and match position
find_keyword = { fg = "#ecbe7b", bg = "#353b45", bold = true }
find_position = { fg = "#c678dd", italic = true }

# Multi-selection markers (left gutter indicators)
marker_selected = { fg = "#282c34", bg = "#98be65" }
marker_copied = { fg = "#282c34", bg = "#ecbe7b" }
marker_cut = { fg = "#282c34", bg = "#ff6c6b" }

# Pane border
border_symbol = "│"
border_style = { fg = "#2257a0" }

# Use terminal default syntax theme for code previews
syntect_theme = ""

# -----------------------------------------------------------------------------
# Tabs
# -----------------------------------------------------------------------------

[tabs]
active = { fg = "#282c34", bg = "#51afef", bold = true }
inactive = { fg = "#5B6268", bg = "#282c34" }

# -----------------------------------------------------------------------------
# Status Bar
# -----------------------------------------------------------------------------

[status]
progress_label = { fg = "#bbc2cf", bold = true }
progress_normal = { fg = "#51afef", bg = "#282c34" }
progress_error = { fg = "#ff6c6b", bg = "#282c34" }

# Permission string  (e.g.  drwxr-xr-x)
perm_sep = { fg = "#5B6268" }
perm_type = { fg = "#98be65" }
perm_read = { fg = "#ecbe7b" }
perm_write = { fg = "#ff6c6b" }
perm_exec = { fg = "#51afef" }

# -----------------------------------------------------------------------------
# Mode Indicator
# -----------------------------------------------------------------------------

[mode]
normal_main = { fg = "#282c34", bg = "#51afef", bold = true }
select_main = { fg = "#282c34", bg = "#98be65", bold = true }
unset_main = { fg = "#282c34", bg = "#c678dd", bold = true }

# -----------------------------------------------------------------------------
# Input Dialog
# -----------------------------------------------------------------------------

[input]
border = { fg = "#51afef" }
title = { fg = "#bbc2cf" }
value = { fg = "#bbc2cf" }
selected = { reversed = true }

# -----------------------------------------------------------------------------
# Pick Dialog (opener selector)
# -----------------------------------------------------------------------------

[pick]
border = { fg = "#51afef" }
active = { fg = "#c678dd", bold = true }
inactive = { fg = "#5B6268" }

# -----------------------------------------------------------------------------
# Tasks Panel
# -----------------------------------------------------------------------------

[tasks]
border = { fg = "#51afef" }
title = { fg = "#bbc2cf" }
hovered = { bg = "#353b45", bold = true }

# -----------------------------------------------------------------------------
# Which-key Popup
# -----------------------------------------------------------------------------

[which]
mask = { bg = "#21242b" }
cand = { fg = "#51afef" }
rest = { fg = "#5B6268" }
desc = { fg = "#a9a1e1" }
separator = "  "
separator_style = { fg = "#2257a0" }

# -----------------------------------------------------------------------------
# Help Panel
# -----------------------------------------------------------------------------

[help]
on = { fg = "#c678dd" }
run = { fg = "#51afef" }
desc = { fg = "#5B6268" }
hovered = { bg = "#353b45", bold = true }
footer = { fg = "#282c34", bg = "#bbc2cf" }

# -----------------------------------------------------------------------------
# Filetype Rules
#
# Order matters: first match wins.
# Trailing "/" on name matches directories.
# -----------------------------------------------------------------------------

[filetype]
rules = [
  # ---- Hidden / dotfiles -----------------------------------------------
  { name = ".*", fg = "#5B6268", italic = true },

  # ---- Special directories (override the generic dotfile rule above) ----
  { name = ".git/", fg = "#ff6c6b", bold = true },
  { name = ".github/", fg = "#5B6268" },
  { name = ".vscode/", fg = "#51afef" },
  { name = ".idea/", fg = "#c678dd" },
  { name = "node_modules/", fg = "#98be65", dim = true },
  { name = ".cache/", fg = "#5B6268", dim = true },
  { name = ".npm/", fg = "#ff6c6b", dim = true },
  { name = ".cargo/", fg = "#da8548", dim = true },
  { name = "dist/", fg = "#ecbe7b" },
  { name = "build/", fg = "#ecbe7b" },
  { name = "target/", fg = "#ecbe7b" },
  { name = "__pycache__/", fg = "#5B6268", dim = true },
  { name = ".pytest_cache/", fg = "#5B6268", dim = true },
  { name = "vendor/", fg = "#c678dd", dim = true },

  # ---- Common user directories ------------------------------------------
  { name = "Downloads/", fg = "#51afef", bold = true },
  { name = "Documents/", fg = "#4db5bd", bold = true },
  { name = "Desktop/", fg = "#c678dd", bold = true },
  { name = "Pictures/", fg = "#46d9ff", bold = true },
  { name = "Music/", fg = "#da8548", bold = true },
  { name = "Videos/", fg = "#ff6c6b", bold = true },
  { name = "src/", fg = "#51afef", bold = true },
  { name = "test/", fg = "#98be65" },
  { name = "tests/", fg = "#98be65" },
  { name = "docs/", fg = "#4db5bd" },

  # ---- Rust -------------------------------------------------------------
  { name = "*.rs", fg = "#da8548" },
  { name = "Cargo.toml", fg = "#da8548", bold = true },
  { name = "Cargo.lock", fg = "#5B6268" },

  # ---- JavaScript / TypeScript ------------------------------------------
  { name = "*.js", fg = "#ecbe7b" },
  { name = "*.jsx", fg = "#ecbe7b" },
  { name = "*.ts", fg = "#51afef" },
  { name = "*.tsx", fg = "#51afef" },
  { name = "*.mjs", fg = "#ecbe7b" },
  { name = "*.cjs", fg = "#ecbe7b" },
  { name = "package.json", fg = "#98be65", bold = true },
  { name = "package-lock.json", fg = "#5B6268" },
  { name = "tsconfig.json", fg = "#51afef" },

  # ---- Python -----------------------------------------------------------
  { name = "*.py", fg = "#51afef" },
  { name = "*.pyx", fg = "#51afef" },
  { name = "*.pyd", fg = "#51afef" },
  { name = "requirements.txt", fg = "#51afef", bold = true },
  { name = "setup.py", fg = "#51afef", bold = true },
  { name = "pyproject.toml", fg = "#51afef", bold = true },

  # ---- Go ---------------------------------------------------------------
  { name = "*.go", fg = "#46d9ff" },
  { name = "go.mod", fg = "#46d9ff", bold = true },
  { name = "go.sum", fg = "#5B6268" },

  # ---- Java / Kotlin ----------------------------------------------------
  { name = "*.java", fg = "#ff6c6b" },
  { name = "*.kt", fg = "#c678dd" },
  { name = "*.gradle", fg = "#98be65" },
  { name = "pom.xml", fg = "#ff6c6b", bold = true },

  # ---- C / C++ ----------------------------------------------------------
  { name = "*.c", fg = "#51afef" },
  { name = "*.h", fg = "#4db5bd" },
  { name = "*.cpp", fg = "#ff6c6b" },
  { name = "*.hpp", fg = "#da8548" },
  { name = "*.cc", fg = "#ff6c6b" },
  { name = "CMakeLists.txt", fg = "#98be65", bold = true },
  { name = "Makefile", fg = "#98be65", bold = true },

  # ---- Swift ------------------------------------------------------------
  { name = "*.swift", fg = "#da8548" },

  # ---- Ruby -------------------------------------------------------------
  { name = "*.rb", fg = "#ff6c6b" },
  { name = "Gemfile", fg = "#ff6c6b", bold = true },

  # ---- Shell Scripts ----------------------------------------------------
  { name = "*.sh", fg = "#98be65" },
  { name = "*.bash", fg = "#98be65" },
  { name = "*.zsh", fg = "#98be65" },
  { name = "*.fish", fg = "#98be65" },

  # ---- Web Development --------------------------------------------------
  { name = "*.html", fg = "#ff6c6b" },
  { name = "*.htm", fg = "#ff6c6b" },
  { name = "*.css", fg = "#51afef" },
  { name = "*.scss", fg = "#c678dd" },
  { name = "*.sass", fg = "#c678dd" },
  { name = "*.less", fg = "#c678dd" },
  { name = "*.vue", fg = "#98be65" },
  { name = "*.svelte", fg = "#da8548" },

  # ---- Configuration Files ----------------------------------------------
  { name = "*.toml", fg = "#a9a1e1" },
  { name = "*.yaml", fg = "#a9a1e1" },
  { name = "*.yml", fg = "#a9a1e1" },
  { name = "*.json", fg = "#ecbe7b" },
  { name = "*.xml", fg = "#da8548" },
  { name = "*.ini", fg = "#5B6268" },
  { name = "*.conf", fg = "#5B6268" },
  { name = "*.cfg", fg = "#5B6268" },
  { name = "*.env", fg = "#ecbe7b", bold = true },
  { name = ".env.*", fg = "#ecbe7b" },
  { name = "*.config", fg = "#a9a1e1" },
  { name = "Dockerfile", fg = "#51afef", bold = true },
  { name = "docker-compose.yml", fg = "#51afef", bold = true },

  # ---- Version Control --------------------------------------------------
  { name = ".gitignore", fg = "#ff6c6b" },
  { name = ".gitattributes", fg = "#ff6c6b" },
  { name = ".gitmodules", fg = "#ff6c6b" },

  # ---- Documents --------------------------------------------------------
  { name = "*.pdf", fg = "#ff6c6b", bold = true },
  { name = "*.doc", fg = "#51afef" },
  { name = "*.docx", fg = "#51afef" },
  { name = "*.xls", fg = "#98be65" },
  { name = "*.xlsx", fg = "#98be65" },
  { name = "*.ppt", fg = "#da8548" },
  { name = "*.pptx", fg = "#da8548" },
  { name = "*.odt", fg = "#51afef" },
  { name = "*.ods", fg = "#98be65" },

  # ---- Text / Markdown --------------------------------------------------
  { name = "*.md", fg = "#4db5bd", bold = true },
  { name = "*.markdown", fg = "#4db5bd" },
  { name = "*.txt", fg = "#bbc2cf" },
  { name = "*.rst", fg = "#4db5bd" },
  { name = "README*", fg = "#ecbe7b", bold = true },
  { name = "LICENSE*", fg = "#ecbe7b", bold = true },
  { name = "CHANGELOG*", fg = "#4db5bd" },

  # ---- Images -----------------------------------------------------------
  { name = "*.png", fg = "#c678dd" },
  { name = "*.jpg", fg = "#c678dd" },
  { name = "*.jpeg", fg = "#c678dd" },
  { name = "*.gif", fg = "#c678dd" },
  { name = "*.bmp", fg = "#c678dd" },
  { name = "*.svg", fg = "#ecbe7b" },
  { name = "*.ico", fg = "#c678dd" },
  { name = "*.webp", fg = "#c678dd" },

  # ---- Videos -----------------------------------------------------------
  { name = "*.mp4", fg = "#ff6c6b" },
  { name = "*.mkv", fg = "#ff6c6b" },
  { name = "*.avi", fg = "#ff6c6b" },
  { name = "*.mov", fg = "#ff6c6b" },
  { name = "*.webm", fg = "#ff6c6b" },
  { name = "*.flv", fg = "#ff6c6b" },

  # ---- Audio ------------------------------------------------------------
  { name = "*.mp3", fg = "#da8548" },
  { name = "*.flac", fg = "#da8548" },
  { name = "*.wav", fg = "#da8548" },
  { name = "*.ogg", fg = "#da8548" },
  { name = "*.m4a", fg = "#da8548" },
  { name = "*.opus", fg = "#da8548" },

  # ---- Archives ---------------------------------------------------------
  { name = "*.zip", fg = "#ff6c6b", bold = true },
  { name = "*.tar", fg = "#ff6c6b" },
  { name = "*.gz", fg = "#ff6c6b" },
  { name = "*.bz2", fg = "#ff6c6b" },
  { name = "*.xz", fg = "#ff6c6b" },
  { name = "*.7z", fg = "#ff6c6b" },
  { name = "*.rar", fg = "#ff6c6b" },
  { name = "*.tgz", fg = "#ff6c6b" },
  { name = "*.tar.gz", fg = "#ff6c6b" },
  { name = "*.tar.bz2", fg = "#ff6c6b" },

  # ---- Databases --------------------------------------------------------
  { name = "*.db", fg = "#98be65" },
  { name = "*.sqlite", fg = "#98be65" },
  { name = "*.sqlite3", fg = "#98be65" },
  { name = "*.sql", fg = "#51afef" },

  # ---- Fonts ------------------------------------------------------------
  { name = "*.ttf", fg = "#5B6268" },
  { name = "*.otf", fg = "#5B6268" },
  { name = "*.woff", fg = "#5B6268" },
  { name = "*.woff2", fg = "#5B6268" },

  # ---- Compiled / Binary ------------------------------------------------
  { name = "*.o", fg = "#5B6268", dim = true },
  { name = "*.so", fg = "#5B6268", dim = true },
  { name = "*.a", fg = "#5B6268", dim = true },
  { name = "*.dll", fg = "#5B6268", dim = true },
  { name = "*.exe", fg = "#98be65", bold = true },
  { name = "*.app", fg = "#98be65", bold = true },

  # ---- Logs -------------------------------------------------------------
  { name = "*.log", fg = "#5B6268", italic = true },

  # ---- Fallback ---------------------------------------------------------
  { name = "*/", fg = "#51afef", bold = true },
  { name = "*", fg = "#bbc2cf" },
]

# -----------------------------------------------------------------------------
