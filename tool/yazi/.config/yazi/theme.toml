# theme.toml -*- mode: toml; -*-
# Time-stamp: <2026-03-28 00:00:00 Friday by zhengyu.li>
# =============================================================================
# Yazi Theme - Catppuccin Mocha Flavor
#
# Usage:    Uses catppuccin-mocha flavor (installed via ya pkg)
#
# Setup:
#   1. stow tool/yazi
#   2. ya pkg install  # Install flavor from package.toml
#
# References:
#   1. https://yazi-rs.github.io/docs/flavors/overview/
#   2. https://github.com/yazi-rs/flavors
# =============================================================================

[flavor]
dark = "catppuccin-mocha"

# Override mgr border style
[mgr]
border_style = { fg = "#45475a" }

# Override indicator to remove preview pane indicator
[indicator]
preview = { fg = "#89b4fa" }

# Style status bar permissions to be less prominent
[status]
perm_type = { fg = "#45475a" }
perm_read = { fg = "#45475a" }
perm_write = { fg = "#45475a" }
perm_exec = { fg = "#45475a" }
perm_sep = { fg = "#45475a" }
