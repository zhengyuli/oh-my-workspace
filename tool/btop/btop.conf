#* Commentary:
#*   Minimal btop config managing only theme and keyboard settings.
#*   All other settings are left at btop defaults to avoid overwriting
#*   the auto-generated 233-line config. Loaded from
#*   $XDG_CONFIG_HOME/btop/btop.conf (btop is XDG-native).
#*
#*   NOTE: On first install with --force, this replaces btop's
#*   auto-generated config. btop will add missing keys on next launch.
#*
#* References:
#*   1. Btop Docs: https://github.com/aristocratos/btop#configurability
#* =============================================================================

#* -----------------------------------------------------------------------------
#* Theme
#* -----------------------------------------------------------------------------

#* Dracula theme (btop resolves bundled theme names automatically)
color_theme = "dracula"

#* Enable 24-bit true color rendering
truecolor = True

#* Use rounded box corners in the UI
rounded_corners = True

#* -----------------------------------------------------------------------------
#* Navigation
#* -----------------------------------------------------------------------------

#* Enable vim-style h/j/k/l navigation
vim_keys = True

#* -----------------------------------------------------------------------------
#* Layout
#* -----------------------------------------------------------------------------

#* Default dashboard panels
shown_boxes = "cpu mem net proc"
