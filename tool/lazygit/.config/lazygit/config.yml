# config.yml -*- mode: yaml; -*-
# Time-stamp: <2026-03-24 10:30:00 Mon by zhengyu.li>
# =============================================================================
# Lazygit - Simple terminal UI for git commands
#
# Location: ~/.config/lazygit/config.yml
# XDG: Follows XDG_CONFIG_HOME, uses ~/.config/lazygit/ on Linux
# References:
#   1. https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md
#   2. https://github.com/jesseduffield/lazygit/blob/master/schema/config.json
# =============================================================================

# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json

# -----------------------------------------------------------------------------
# GUI
# -----------------------------------------------------------------------------

gui:
  nerdFontsVersion: "3"
  showFileTree: true
  showRandomTip: false
  showCommandLog: false

  theme:
    activeBorderColor:
      - '#91d7e3'
      - bold
    inactiveBorderColor:
      - '#a5adcb'
    optionsTextColor:
      - '#8aadf4'
    selectedLineBgColor:
      - '#363a4f'
    cherryPickedCommitBgColor:
      - '#494d64'
    cherryPickedCommitFgColor:
      - '#91d7e3'
    unstagedChangesColor:
      - '#ed8796'
    defaultFgColor:
      - '#cad3f5'
    searchingActiveBorderColor:
      - '#eed49f'

  authorColors:
    '*': '#b7bdf8'

# -----------------------------------------------------------------------------
# Git
# -----------------------------------------------------------------------------

git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never

# -----------------------------------------------------------------------------
# OS
# -----------------------------------------------------------------------------

os:
  editPreset: vim

notARepository: prompt

# -----------------------------------------------------------------------------
# Keybindings
# -----------------------------------------------------------------------------

keybinding:
  universal:
    prevTab: '['
    nextTab: ']'
