# config.yml -*- mode: yaml; -*-
# Time-stamp: <2026-03-24 10:30:00 Mon by zhengyu.li>
# =============================================================================
# Lazygit - Simple terminal UI for git commands
#
# Location: ~/.config/lazygit/config.yml
# XDG: Follows XDG_CONFIG_HOME, uses ~/.config/lazygit/ on Linux
# References:
#   1. https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md
#   2. https://github.com/jesseduffield/lazygit/blob/master/schema/config.json
# =============================================================================

# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json

# -----------------------------------------------------------------------------
# GUI
# -----------------------------------------------------------------------------

gui:
  nerdFontsVersion: "3"
  showFileTree: true
  showRandomTip: false
  showCommandLog: false

  # Catppuccin Mocha Blue theme
  # Reference: https://github.com/catppuccin/lazygit
  theme:
    activeBorderColor:
      - '#89b4fa'
      - bold
    inactiveBorderColor:
      - '#a6adc8'
    optionsTextColor:
      - '#89b4fa'
    selectedLineBgColor:
      - '#313244'
    cherryPickedCommitBgColor:
      - '#45475a'
    cherryPickedCommitFgColor:
      - '#89b4fa'
    unstagedChangesColor:
      - '#f38ba8'
    defaultFgColor:
      - '#cdd6f4'
    searchingActiveBorderColor:
      - '#f9e2af'

  authorColors:
    '*': '#cba6f7'

# -----------------------------------------------------------------------------
# Git
# -----------------------------------------------------------------------------

git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never

# -----------------------------------------------------------------------------
# OS
# -----------------------------------------------------------------------------

os:
  editPreset: vim

notARepository: prompt

# -----------------------------------------------------------------------------
# Keybindings
# -----------------------------------------------------------------------------

keybinding:
  universal:
    prevTab: '['
    nextTab: ']'
