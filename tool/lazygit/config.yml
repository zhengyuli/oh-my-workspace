# yaml-language-server: $schema=https://json.schemastore.org/lazygit

# -----------------------------------------------------------------------------
# GUI
# -----------------------------------------------------------------------------

gui:
  nerdFontsVersion: '3'
  showRandomTip: false
  showCommandLog: false
  # Catppuccin Mocha Blue theme for visual consistency with terminal
  # Reference: https://github.com/catppuccin/lazygit
  theme:
    activeBorderColor:
      - '#89b4fa'
      - bold
    inactiveBorderColor:
      - '#a6adc8'
    optionsTextColor:
      - '#89b4fa'
    selectedLineBgColor:
      - '#313244'
    cherryPickedCommitBgColor:
      - '#45475a'
    cherryPickedCommitFgColor:
      - '#89b4fa'
    unstagedChangesColor:
      - '#f38ba8'
    defaultFgColor:
      - '#cdd6f4'
    searchingActiveBorderColor:
      - '#f9e2af'
  authorColors:
    '*': '#cba6f7'

# -----------------------------------------------------------------------------
# Git
# -----------------------------------------------------------------------------

git:
  # NOTE: `pagers` (list) is the v0.56+ format replacing the old `paging` (object)
  pagers:
    # Force color output for delta to render syntax highlighting
    - colorArg: always
      # Use delta in dark mode without paging (lazygit handles paging)
      pager: 'delta --dark --paging=never'

# -----------------------------------------------------------------------------
# OS
# -----------------------------------------------------------------------------

os:
  # Open files in Neovim (spawns a new instance per edit)
  editPreset: nvim

# -----------------------------------------------------------------------------
# Keybindings
# -----------------------------------------------------------------------------

keybinding:
  universal:
    # Vim-style tab navigation with [ and ] (adjacent keys on US keyboard)
    prevTab: '['
    nextTab: ']'
