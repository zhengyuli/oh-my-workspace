# Commentary:
#   Plugin-free tmux configuration. Loaded automatically from
#   $XDG_CONFIG_HOME/tmux/tmux.conf (tmux 3.1+ is XDG-native).
#
#   Dracula color palette (matching Ghostty theme):
#     Background: #282a36    Foreground: #f8f8f2
#     Selection:  #44475a    Comment:    #6272a4
#     Purple:     #bd93f9    Green:      #50fa7b
#     Pink:       #ff79c6    Cyan:       #8be9fd
#
# References:
#   1. Man Page:    man tmux
#   2. Wiki:        https://github.com/tmux/tmux/wiki
#   3. Dracula:     https://draculatheme.com/tmux
# =============================================================================

# -----------------------------------------------------------------------------
# General
# -----------------------------------------------------------------------------

# Remap prefix from Ctrl+B to Ctrl+A (more ergonomic)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reduce escape delay for Vim/Emacs responsiveness
set -g escape-time 0

# Start window and pane indices at 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Large scrollback buffer
set -g history-limit 50000

# Enable mouse support (scroll, select, resize)
set -g mouse on

# Use vi key bindings in copy mode
setw -g mode-keys vi

# -----------------------------------------------------------------------------
# True Color
# -----------------------------------------------------------------------------

# Enable 24-bit true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",*-ghostty:Tc"

# -----------------------------------------------------------------------------
# Key Bindings
# -----------------------------------------------------------------------------

# Split panes with | and - (more intuitive than % and ")
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows open in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# -----------------------------------------------------------------------------
# Status Bar (Dracula Theme)
# -----------------------------------------------------------------------------

set -g status-position bottom
set -g status-style "bg=#282a36,fg=#f8f8f2"
set -g status-left-length 40
set -g status-right-length 80

set -g status-left "#[fg=#282a36,bg=#bd93f9,bold] #S #[fg=#bd93f9,bg=#282a36] "
set -g status-right "#[fg=#f8f8f2,bg=#44475a] %Y-%m-%d #[fg=#282a36,bg=#6272a4,bold] %H:%M "

# Active window
setw -g window-status-current-format "#[fg=#282a36,bg=#bd93f9,bold] #I:#W "

# Inactive window
setw -g window-status-format "#[fg=#f8f8f2,bg=#44475a] #I:#W "

# Pane borders
set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"

# Message style
set -g message-style "bg=#44475a,fg=#f8f8f2"
