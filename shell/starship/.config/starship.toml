# References:
#   1. Starship Docs: https://starship.rs/config/
#   2. Nerd Fonts: https://www.nerdfonts.com/
# =============================================================================

"$schema" = 'https://starship.rs/config-schema.json'

# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------

# Date/time on info line (before line break), input line has only character
format = "$all${custom.rdate}${custom.rtime}$line_break$character"

[directory]
read_only = " ¾░î¥"

[hostname]
ssh_symbol = "¾░úç "

[memory_usage]
symbol = "¾░ıø "

[status]
symbol = "Ô£ò "

[time]
disabled = true

[custom.rdate]
command = "date '+%Y-%m-%d'"
format = "[Time:$output/]($style)"
style = "#bd93f9"
when = "true"

[custom.rtime]
command = "date '+%H:%M:%S'"
format = "[$output]($style)"
style = "#8be9fd"
when = "true"

