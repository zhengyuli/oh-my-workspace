# Commentary:
#   Cross-shell prompt with Nerd Font symbols and custom date/time modules.
#
# References:
#   1. Starship Docs: https://starship.rs/config/
#   2. Nerd Fonts: https://www.nerdfonts.com/
# =============================================================================

"$schema" = 'https://starship.rs/config-schema.json'

# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------

# Extend timeout for slow commands (default 500ms)
command_timeout = 2000

# Use lock icon to mark read-only directories
[directory]
read_only = " ¾░î¥"

# Use NixOS icon for SSH hostname indicator
[hostname]
ssh_symbol = "¾░úç "

# Use memory chip icon for memory usage display
[memory_usage]
symbol = "¾░ìø "

# Use heavy ballot x for command failure indicator
[status]
symbol = "Ô£ò "

# Disable built-in time (replaced by custom rdate/rtime modules)
[time]
disabled = true

# -----------------------------------------------------------------------------
# Custom Modules
# -----------------------------------------------------------------------------

format = "$all${custom.rdate}${custom.rtime}$line_break$character"

[custom.rdate]
command = "date '+%Y-%m-%d'"
format = "[Time:$output/]($style)"
style = "#bd93f9"
when = "true"

[custom.rtime]
command = "date '+%H:%M:%S'"
format = "[$output]($style)"
style = "#8be9fd"
when = "true"

