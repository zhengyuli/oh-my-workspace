# History:
#   2026-03-20 00:00 zhengyu li <lizhengyu419@outlook.com> created.
#
# Commentary:
#   Global configuration for the UV Python package manager.
#   XDG: Native support (no UV_* env overrides needed)
#        - Cache: $XDG_CACHE_HOME/uv (~/.cache/uv)
#        - Data:  $XDG_DATA_HOME/uv (~/.local/share/uv)
#        - State: $XDG_STATE_HOME/uv (~/.local/state/uv)
#   Project-specific settings go in pyproject.toml [tool.uv] section.
#
# References:
#   1. Official Docs: https://docs.astral.sh/uv/concepts/configuration-files/
#   2. Config Options: https://docs.astral.sh/uv/reference/settings/
#   3. PyTorch: https://docs.astral.sh/uv/guides/integration/pytorch/
# =============================================================================

# -----------------------------------------------------------------------------
# Publishing
# -----------------------------------------------------------------------------

publish-url = "https://upload.pypi.org/legacy/"

# -----------------------------------------------------------------------------
# Networking
# -----------------------------------------------------------------------------

# Use system trust store (Keychain) instead of bundled webpki-roots.
# Required for: corporate proxies, self-signed CAs, non-Mozilla certificates.
native-tls = true

# -----------------------------------------------------------------------------
# Package Index
# -----------------------------------------------------------------------------

[[index]]
name = "pypi"
url = "https://pypi.org/simple/"
default = true
