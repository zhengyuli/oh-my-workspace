# Commentary:
#   Bun runtime global config. Redirects install cache to XDG cache dir.
#   XDG: Native support (no BUN_* env overrides needed)
#
# References:
#   1. Bun Config Docs: https://bun.sh/docs/runtime/bunfig
# =============================================================================

# -----------------------------------------------------------------------------
# Telemetry
# -----------------------------------------------------------------------------

# Disable anonymous crash report telemetry
telemetry = false

# -----------------------------------------------------------------------------
# Install Behavior
# -----------------------------------------------------------------------------

# Pin exact versions in package.json (no ^ or ~ ranges).
# Ensures reproducible installs without relying solely on lockfile.
[install]
exact = true

# Redirect to XDG cache dir so ~/.bun stays clean and follows XDG spec
[install.cache]
dir = "~/.cache/bun/install/cache"
